<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panini Mundial 2026 🏆</title>
<style>
@media print {
  body{background:#fff!important;color:#000!important;font-family:Arial,sans-serif}
  .app{display:none!important}
  .pdoc{display:block!important}
  .ph{text-align:center;margin-bottom:14px;border-bottom:2px solid #000;padding-bottom:8px}
  .ph h1{font-size:18px;font-weight:bold;margin-bottom:3px}
  .ph p{font-size:10px;color:#555}
  .pstats{display:flex;gap:18px;margin-bottom:12px;font-size:11px}
  .pstat{font-weight:bold}
  .psec{margin-bottom:14px;page-break-inside:avoid}
  .psec h2{font-size:12px;font-weight:bold;background:#000;color:#fff;padding:3px 7px;margin-bottom:5px}
  .pgrid{display:flex;flex-wrap:wrap;gap:3px}
  .pchip{border:1px solid #aaa;border-radius:3px;padding:2px 5px;font-size:9px}
  .pchip.r{background:#fff3cd;border-color:#c9a100}
  .pempty{font-size:11px;color:#777;font-style:italic}
  .pfooter{margin-top:14px;font-size:9px;color:#aaa;text-align:center;border-top:1px solid #ccc;padding-top:5px}
}
:root{
  --bg:#0f0f0f;--s1:#1c1c1c;--s2:#262626;--bd:#333;
  --tx:#f0f0f0;--mu:#666;--hi:#444;
  --re:#e8363a;--go:#f5a623;
  --gn:#27ae60;--gnb:rgba(39,174,96,.14);--gnd:rgba(39,174,96,.45);
  --am:#e67e22;--amb:rgba(230,126,34,.14);--amd:rgba(230,126,34,.45);
  --pu:#8b5cf6;--pub:rgba(139,92,246,.12);--pud:rgba(139,92,246,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
button,select,input{font-family:inherit;cursor:pointer}
.pdoc{display:none}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:12px 14px 10px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:19px;font-weight:700;color:var(--go)}.logo span{color:var(--re)}
.badge{background:var(--re);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat{background:var(--s2);border-radius:8px;padding:7px 4px;text-align:center}
.sn{font-size:20px;font-weight:600;line-height:1}
.g{color:var(--gn)}.r{color:var(--re)}.a{color:var(--am)}
.sl{font-size:9px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.prog{height:4px;background:var(--s2);border-radius:99px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--re),var(--go));border-radius:99px;transition:width .4s;width:0%}
/* TABS */
.tabs{display:flex;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mu);font-size:10px;font-weight:500;border-top:2px solid transparent;transition:all .15s}
.tab.on{color:var(--go);border-top-color:var(--go)}
.ti{font-size:20px;line-height:1}
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pad{padding:12px}
/* CONTROLS */
.ctrls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ctrl{height:46px;border-radius:10px;border:1.5px solid var(--bd);background:var(--s1);color:var(--mu);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.ctrl.on-a{border-color:var(--gn);color:var(--gn);background:var(--gnb)}
.ctrl.on-d{border-color:var(--re);color:var(--re);background:rgba(232,54,58,.1)}
/* TEAM NAV */
.tnav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.arr{width:42px;height:42px;flex-shrink:0;border-radius:10px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:22px;display:flex;align-items:center;justify-content:center}
.arr:disabled{opacity:.3}
.tinfo{flex:1;min-width:0;text-align:center}
.tname{font-size:15px;font-weight:700;color:var(--go);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:11px;color:var(--mu);margin-top:1px}
.tsel{width:100%;background:var(--s1);border:1px solid var(--bd);color:var(--tx);border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:10px}
.tprow{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:5px}
.tpbar{height:4px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:12px}
.tpfill{height:100%;background:var(--gn);border-radius:99px;transition:width .3s}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu)}
.ld{width:12px;height:12px;border-radius:3px}
/* STICKER GRID 4 cols */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stk{border-radius:8px;border:1px solid var(--bd);background:var(--s2);padding:6px 3px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:68px;position:relative;-webkit-user-select:none;user-select:none;transition:transform .1s}
.stk:active{transform:scale(.91)}
.sc{font-size:10px;font-weight:700;color:var(--mu);line-height:1.2;text-align:center}
.sn2{font-size:10px;color:var(--hi);text-align:center;line-height:1.3;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stk.t{background:var(--gnb);border-color:var(--gnd)}.stk.t .sc{color:var(--gn)}.stk.t .sn2{color:rgba(39,174,96,.75)}
.stk.rp{background:var(--amb);border-color:var(--amd)}.stk.rp .sc{color:var(--am)}.stk.rp .sn2{color:rgba(230,126,34,.75)}
.stk.fl{border-color:var(--pud)}.stk.fl .sc{color:var(--pu)}
.stk.fl.t{background:var(--pub)}.stk.fl.t .sc{color:#a78bfa}
.stk.fl.rp{background:var(--amb)}
.rb{position:absolute;top:3px;right:4px;font-size:8px;font-weight:700;color:var(--am)}
.fs{position:absolute;top:3px;left:4px;font-size:8px;color:var(--pu)}
/* EDIT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;display:none}
.modal-bg.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;width:calc(100% - 40px);max-width:340px}
.modal h3{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px}
.modal p{font-size:11px;color:var(--mu);margin-bottom:12px}
.modal input{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px}
.modal input:focus{outline:none;border-color:var(--go)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-btn{height:42px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:13px;font-weight:500}
.modal-btn.ok{background:var(--go);border-color:var(--go);color:#000}
/* GROUPS TAB */
.gitem{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);gap:10px;cursor:pointer}
.gitem-info{flex:1}
.gitem-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em}
.gitem-teams{font-size:13px;color:var(--tx);font-weight:500;margin-top:2px}
.gitem-bar{width:56px;height:4px;background:var(--s2);border-radius:99px;overflow:hidden}
.gitem-fill{height:100%;background:var(--gn);border-radius:99px}
.gitem-num{font-size:11px;color:var(--mu);min-width:36px;text-align:right}
/* WA TAB */
.mrow{display:flex;gap:6px;margin-bottom:14px}
.mb{flex:1;height:40px;border-radius:10px;border:1px solid var(--bd);background:var(--s1);color:var(--mu);font-size:11px;font-weight:500}
.mb.on{border-color:#25D366;color:#25D366;background:rgba(37,211,102,.08)}
.slbl{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.mprev{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:11px;color:var(--tx);white-space:pre-wrap;line-height:1.7;max-height:200px;overflow-y:auto;margin-bottom:14px;font-family:monospace}
.abr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.abtn{height:50px;border-radius:12px;border:1.5px solid var(--bd);background:var(--s1);color:var(--tx);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
.abtn.wa{background:#25D366;border-color:#25D366;color:#fff}
.abtn.pdf{background:var(--s2)}
.abtn:active{transform:scale(.97)}
.sep{height:1px;background:var(--bd);margin:14px 0}
.wag{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.wag-t{font-size:13px;font-weight:700;color:var(--go);margin-bottom:4px}
.wag-l{font-size:11px;color:var(--mu);line-height:1.7}
.wag-l span{color:var(--tx)}
</style>
</head>

<div class="pdoc" id="pdoc"></div>
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Editar nombre</h3>
    <p id="modal-code">Código: —</p>
    <input type="text" id="modal-input" placeholder="Nombre del jugador">
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn ok" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>
<div class="app">
  <div class="hdr">
    <div class="hdr-top"><div class="logo">Panini <span>2026</span> 🏆</div><div class="badge" id="pct-b">0%</div></div>
    <div class="stats">
      <div class="stat"><div class="sn g" id="s-t">0</div><div class="sl">Tengo</div></div>
      <div class="stat"><div class="sn r" id="s-f">980</div><div class="sl">Faltan</div></div>
      <div class="stat"><div class="sn a" id="s-r">0</div><div class="sl">Repetidas</div></div>
    </div>
    <div class="prog"><div class="pf" id="prog"></div></div>
  </div>
  <div class="body">
    <div class="pad" id="tab-album">
      <div class="ctrls">
        <button class="ctrl on-a" id="btn-a" onclick="setMode('a')">＋ Agregar stiker</button>
        <button class="ctrl" id="btn-d" onclick="setMode('d')">－ Borrar stiker</button>
      </div>
      <select class="tsel" id="tsel" onchange="goSec(this.value)"></select>
      <div class="tnav">
        <button class="arr" id="arr-p" onclick="prevS()">‹</button>
        <div class="tinfo"><div class="tname" id="tname">—</div><div class="tsub" id="tsub">—</div></div>
        <button class="arr" id="arr-n" onclick="nextS()">›</button>
      </div>
      <div class="tprow"><span id="tp-t">0/0</span><span id="tp-p">0%</span></div>
      <div class="tpbar"><div class="tpfill" id="tp-f"></div></div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:var(--gnb);border:1px solid var(--gnd)"></div>Tengo</div>
        <div class="li"><div class="ld" style="background:var(--amb);border:1px solid var(--amd)"></div>Repetida</div>
        <div class="li"><div class="ld" style="background:var(--s2);border:1px solid var(--bd)"></div>Falta</div>
        <div class="li"><div class="ld" style="background:var(--pub);border:1px solid var(--pud)"></div>★ FOIL</div>
        <div class="li" style="color:var(--go);font-size:10px">✏️ mant. puls. = editar</div>
      </div>
      <div class="sgrid" id="grid"></div>
    </div>
    <div class="pad" id="tab-grupos" style="display:none"><div id="glist"></div></div>
    <div class="pad" id="tab-wa" style="display:none">
      <div class="mrow">
        <button class="mb on" id="mb-a" onclick="setMsg('a')">Ambas</button>
        <button class="mb" id="mb-f" onclick="setMsg('f')">Faltantes</button>
        <button class="mb" id="mb-r" onclick="setMsg('r')">Repetidas</button>
      </div>
      <div class="slbl">Vista previa</div>
      <div class="mprev" id="mprev">Sin láminas aún.</div>
      <div class="abr">
        <button class="abtn" onclick="doCopy(event)">📋 Copiar</button>
        <button class="abtn wa" onclick="doWA()">📲 WhatsApp</button>
      </div>
      <div class="abr">
        <button class="abtn pdf" onclick="doPDF('f')" style="font-size:12px">🖨️ PDF Faltantes</button>
        <button class="abtn pdf" onclick="doPDF('r')" style="font-size:12px">🖨️ PDF Repetidas</button>
      </div>
      <div class="sep"></div>
      <div class="slbl">Por grupo</div>
      <div id="wa-groups"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="setTab('album')" id="t-a"><span class="ti">📋</span><span>Álbum</span></button>
    <button class="tab" onclick="setTab('grupos')" id="t-g"><span class="ti">🌍</span><span>Grupos</span></button>
    <button class="tab" onclick="setTab('wa')" id="t-w"><span class="ti">💬</span><span>WhatsApp</span></button>
  </div>
</div>

function getName(s){return edits[s.c]||s.n;}
function allS(){return SECTIONS.flatMap(s=>s.stickers);}

function updateStats(){
  const all=allS();let t=0,f=0,r=0;
  all.forEach(s=>{const q=stk[s.c]||0;if(!q)f++;else{t++;if(q>1)r++;}});
  document.getElementById('s-t').textContent=t;
  document.getElementById('s-f').textContent=f;
  document.getElementById('s-r').textContent=r;
  const p=Math.round(t/TOTAL*100);
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('pct-b').textContent=p+'%';
}

function buildSelect(){
  const sel=document.getElementById('tsel');
  SECTIONS.forEach((s,i)=>{
    const o=document.createElement('option');
    o.value=i;
    // FORMAT: "Grupo A — MEX — México"
    o.textContent=`${s.g} — ${s.code} — ${s.label}`;
    sel.appendChild(o);
  });
}

function renderSec(){
  const sec=SECTIONS[cur];
  document.getElementById('tname').textContent=`${sec.g} · ${sec.label}`;
  document.getElementById('tsub').textContent=sec.sub;
  document.getElementById('tsel').value=cur;
  document.getElementById('arr-p').disabled=cur===0;
  document.getElementById('arr-n').disabled=cur===SECTIONS.length-1;
  const tot=sec.stickers.length,have=sec.stickers.filter(s=>(stk[s.c]||0)>0).length;
  const p=tot?Math.round(have/tot*100):0;
  document.getElementById('tp-t').textContent=`${have}/${tot}`;
  document.getElementById('tp-p').textContent=p+'%';
  document.getElementById('tp-f').style.width=p+'%';
  const grid=document.getElementById('grid');grid.innerHTML='';
  sec.stickers.forEach(s=>{
    const q=stk[s.c]||0;
    const el=document.createElement('div');
    el.className='stk'+(s.f?' fl':'')+(q===1?' t':q>1?' rp':'');
    el.innerHTML=`<div class="sc">${s.c}</div><div class="sn2">${getName(s)}</div>`
      +(s.f?'<div class="fs">★</div>':'')
      +(q>1?`<div class="rb">x${q}</div>`:'');
    el.addEventListener('click',()=>onStk(s,el));
    el.addEventListener('contextmenu',(e)=>{e.preventDefault();openModal(s);});
    let lt;
    el.addEventListener('touchstart',()=>{lt=setTimeout(()=>openModal(s),600);},{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(lt),{passive:true});
    el.addEventListener('touchmove',()=>clearTimeout(lt),{passive:true});
    grid.appendChild(el);
  });
}

function onStk(s,el){
  if(mode==='a') stk[s.c]=(stk[s.c]||0)+1;
  else{if(!stk[s.c])return;stk[s.c]--;if(!stk[s.c])delete stk[s.c];}
  save();updateStats();updateTprog();if(curTab==='wa')updateMsg();
  const q=stk[s.c]||0;
  el.className='stk'+(s.f?' fl':'')+(q===1?' t':q>1?' rp':'');
  const ob=el.querySelector('.rb');if(ob)ob.remove();
  if(q>1){const b=document.createElement('div');b.className='rb';b.textContent='x'+q;el.appendChild(b);}
  const sn=el.querySelector('.sn2');if(sn)sn.textContent=getName(s);
}

function updateTprog(){
  const sec=SECTIONS[cur],tot=sec.stickers.length;
  const have=sec.stickers.filter(s=>(stk[s.c]||0)>0).length;
  const p=tot?Math.round(have/tot*100):0;
  document.getElementById('tp-t').textContent=`${have}/${tot}`;
  document.getElementById('tp-p').textContent=p+'%';
  document.getElementById('tp-f').style.width=p+'%';
}

function openModal(s){
  editCode=s.c;
  document.getElementById('modal-code').textContent=`Código: ${s.c} — ${s.n}`;
  document.getElementById('modal-input').value=getName(s);
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');editCode=null;}
function saveEdit(){
  if(!editCode)return;
  const val=document.getElementById('modal-input').value.trim();
  if(val) edits[editCode]=val; else delete edits[editCode];
  save();closeModal();renderSec();
}
document.getElementById('modal-input').addEventListener('keydown',(e)=>{if(e.key==='Enter')saveEdit();});

function prevS(){if(cur>0){cur--;document.getElementById('tsel').value=cur;renderSec();}}
function nextS(){if(cur<SECTIONS.length-1){cur++;document.getElementById('tsel').value=cur;renderSec();}}
function goSec(i){cur=parseInt(i);renderSec();}
function setMode(m){
  mode=m;
  document.getElementById('btn-a').className='ctrl'+(m==='a'?' on-a':'');
  document.getElementById('btn-d').className='ctrl'+(m==='d'?' on-d':'');
}

function setTab(t){
  curTab=t;
  ['album','grupos','wa'].forEach(id=>document.getElementById('tab-'+id).style.display=id===t?'block':'none');
  ['a','g','w'].forEach((id,i)=>document.getElementById('t-'+id).classList.toggle('on',['album','grupos','wa'][i]===t));
  if(t==='grupos')renderGroups();
  if(t==='wa')updateMsg();
}

function renderGroups(){
  const gl=document.getElementById('glist');gl.innerHTML='';
  const groups={};
  SECTIONS.forEach((sec,i)=>{
    if(!groups[sec.g])groups[sec.g]={teams:[],codes:[],total:0,have:0,firstIdx:i};
    groups[sec.g].teams.push(sec.label);
    groups[sec.g].codes.push(sec.code);
    groups[sec.g].total+=sec.stickers.length;
    groups[sec.g].have+=sec.stickers.filter(s=>(stk[s.c]||0)>0).length;
  });
  Object.entries(groups).forEach(([g,d])=>{
    const p=Math.round(d.have/d.total*100);
    const div=document.createElement('div');div.className='gitem';
    div.innerHTML=`<div class="gitem-info"><div class="gitem-label">${g}</div><div class="gitem-teams">${d.teams.join(' · ')}</div></div><div class="gitem-bar"><div class="gitem-fill" style="width:${p}%"></div></div><div class="gitem-num">${d.have}/${d.total}</div>`;
    div.addEventListener('click',()=>{cur=d.firstIdx;setTab('album');renderSec();});
    gl.appendChild(div);
  });
}

function setMsg(m){
  msgMode=m;
  ['a','f','r'].forEach(id=>document.getElementById('mb-'+id).classList.toggle('on',id===m));
  updateMsg();
}

function updateMsg(){
  const all=allS(),faltan=[],reps=[];
  all.forEach(s=>{const q=stk[s.c]||0;if(!q)faltan.push(s.c);else if(q>1)reps.push(`${s.c}×${q}`);});
  const tengo=TOTAL-faltan.length,pct=Math.round(tengo/TOTAL*100),bars=Math.round(pct/10);
  let msg=`⚽ *Álbum Panini Mundial 2026*\n📊 ${tengo}/${TOTAL} (${pct}%)\n${'▓'.repeat(bars)}${'░'.repeat(10-bars)} ${pct}%\n\n`;
  if(msgMode==='a'||msgMode==='f'){msg+=`❌ *Me faltan (${faltan.length}):*\n`+(faltan.length?faltan.join(' · '):'¡Álbum completo! 🏆')+'\n\n';}
  if(msgMode==='a'||msgMode==='r'){msg+=`🔁 *Para cambiar (${reps.length}):*\n`+(reps.length?reps.join(' · '):'Sin repetidas.')+'\n';}
  msg+=`\n_¡Escribime si tenés las que me faltan! 🤝_`;
  document.getElementById('mprev').textContent=msg;
  const wg=document.getElementById('wa-groups');wg.innerHTML='';
  const byG={};
  SECTIONS.forEach(sec=>{
    if(!byG[sec.g])byG[sec.g]={f:[],r:[]};
    sec.stickers.forEach(s=>{
      const q=stk[s.c]||0;
      if(!q)byG[sec.g].f.push(s.c);
      else if(q>1)byG[sec.g].r.push(`${s.c}×${q}`);
    });
  });
  Object.entries(byG).forEach(([g,d])=>{
    if(!d.f.length&&!d.r.length)return;
    const div=document.createElement('div');div.className='wag';
    div.innerHTML=`<div class="wag-t">${g}</div>`
      +(d.f.length?`<div class="wag-l">Faltan: <span>${d.f.join(', ')}</span></div>`:'')
      +(d.r.length?`<div class="wag-l">Repetidas: <span>${d.r.join(', ')}</span></div>`:'');
    wg.appendChild(div);
  });
}

function doCopy(e){
  const txt=document.getElementById('mprev').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=e.currentTarget,orig=btn.innerHTML;btn.textContent='✓ Copiado';
    setTimeout(()=>{btn.innerHTML=orig;},1600);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const btn=e.currentTarget,orig=btn.innerHTML;btn.textContent='✓ Copiado';
    setTimeout(()=>{btn.innerHTML=orig;},1600);
  });
}
function doWA(){window.open('https://wa.me/?text='+encodeURIComponent(document.getElementById('mprev').textContent),'_blank');}

function doPDF(tipo){
  const all=allS();
  const list=[];
  SECTIONS.forEach(sec=>{
    sec.stickers.forEach(s=>{
      const q=stk[s.c]||0;
      if(tipo==='f'&&!q) list.push({c:s.c,n:getName(s),g:sec.g});
      if(tipo==='r'&&q>1) list.push({c:s.c,n:getName(s),q,g:sec.g});
    });
  });
  const faltan=allS().filter(s=>!(stk[s.c]||0)).length;
  const reps=allS().filter(s=>(stk[s.c]||0)>1).length;
  const tengo=TOTAL-faltan,pct=Math.round(tengo/TOTAL*100);
  const now=new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'});
  const byG={};
  list.forEach(item=>{if(!byG[item.g])byG[item.g]=[];byG[item.g].push(item);});
  let html=`<div class="ph"><h1>⚽ Álbum Panini Mundial 2026</h1><p>${tipo==='f'?'Lista de Láminas FALTANTES':'Lista de Láminas REPETIDAS'} — ${now}</p></div>`;
  html+=`<div class="pstats"><span class="pstat">📊 Progreso: ${tengo}/${TOTAL} (${pct}%)</span><span class="pstat">❌ Faltan: ${faltan}</span><span class="pstat">🔁 Repetidas: ${reps}</span></div>`;
  if(!list.length){
    html+=`<p class="pempty">${tipo==='f'?'¡Álbum completo! No te falta ninguna.':'No tienes láminas repetidas aún.'}</p>`;
  } else {
    Object.entries(byG).forEach(([g,items])=>{
      html+=`<div class="psec"><h2>${g} — ${items.length} láminas</h2><div class="pgrid">`;
      items.forEach(item=>{
        html+=tipo==='f'
          ?`<span class="pchip">${item.c} ${item.n}</span>`
          :`<span class="pchip r">×${item.q} ${item.c} ${item.n}</span>`;
      });
      html+=`</div></div>`;
    });
  }
  html+=`<div class="pfooter">Panini Mundial 2026 Tracker — app personal</div>`;
  document.getElementById('pdoc').innerHTML=html;
  setTimeout(()=>window.print(),120);
}

load();buildSelect();renderSec();updateStats();
</script>
</body>
</html>
